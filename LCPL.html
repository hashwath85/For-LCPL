<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Priya ✨</title>
    <style>
        /* Pure Black Universe Background */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #000000;
            color: #f3e8ff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Canvas layer for slow-twinkling JS stars */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Cosmic Card with a Melodious, Pulsing Breathing Effect */
        .card {
            position: relative;
            z-index: 3;
            text-align: center;
            background: #0d0b14;
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(147, 51, 234, 0.15);
            max-width: 400px;
            width: 90%;
            
            /* Gentle fade-in on load and infinite slow pulse */
            animation: fadeIn 2.5s ease-out forwards, cardPulse 8s ease-in-out infinite alternate;
        }

        /* Soft Lavender Cover Art Bracket */
        .cover-art {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #c084fc, #6366f1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
        }

        /* Perfectly Circular Premium Photo Space */
        .photo-space {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        .photo-space img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps the photo from stretching */
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p {
            font-size: 0.95rem;
            color: #c084fc;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Premium Purple Launch Button with Slow Transition */
        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #7c3aed, #4f46e5);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            
            /* Ultra smooth hover shift */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 25px rgba(124, 58, 237, 0.5);
        }

        .hint {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #a78bfa;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* --- Slow Transitions & Keyframes --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cardPulse {
            0% {
                box-shadow: 0 0 30px rgba(147, 51, 234, 0.1);
                border-color: rgba(147, 51, 234, 0.1);
            }
            100% {
                box-shadow: 0 0 50px rgba(147, 51, 234, 0.25);
                border-color: rgba(147, 51, 234, 0.3);
            }
        }
    </style>
</head>
<body>

    <!-- HTML5 Canvas for Slow JS Twinkling Stars -->
    <canvas id="starfield"></canvas>

    <!-- Interface Card -->
    <div class="card">
        <div class="cover-art">
            <!-- Circular Photo Frame Slot -->
            <div class="photo-space">
                <img src="priya.jpg" alt="Priya">
            </div>
        </div>
        
        <h1>Happy Birthday, Priya! 🎂</h1>
        <p>A custom collection of some incredible tracks. Built for the days when the day gets a little hopeless.</p>
        
        <!-- PASTE YOUR ACTUAL SPOTIFY PLAYLIST LINK HERE -->
        <a href="https://open.spotify.com/playlist/2ItLN0A2K9Zhvf9bYrtuEU?si=b90de271b1074b55&pt=d0b41e4cdd876bdc94880b577fde701e" target="_blank" class="btn">Open the Mixtape</a>
        
        <div class="hint">
            Hint: Read the tracklist from the top down to find the hidden massage. ✨
        </div>
    </div>

    <!-- JavaScript for Dynamic, Decelerated Lavender Star Twinkling -->
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        let stars = [];
        const numStars = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.4,
                    alpha: Math.random(),
                    speed: Math.random() * 0.006 + 0.002 
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 0.85 || star.alpha < 0.05) {
                    star.speed = -star.speed;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(233, 213, 255, ${star.alpha})`;
                ctx.fill();
            });

            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();
    </script>

</body>
</html>
